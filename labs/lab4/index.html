<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 4 — ITC OS 2026</title>
    <link rel="stylesheet" href="../../assets/terminal-theme.css">
</head>
<body>
<div class="container">
    <div class="breadcrumb">
        <span class="prompt-symbol">$</span>
        <a href="../../index.html">~</a>
        <span class="sep">/</span>
        <a href="../index.html">labs</a>
        <span class="sep">/</span>
        <span class="current">lab4</span>
    </div>

    <div class="terminal reveal">
        <div class="terminal-header">
            <span class="terminal-btn btn-close"></span>
            <span class="terminal-btn btn-min"></span>
            <span class="terminal-btn btn-max"></span>
            <span class="terminal-title">student@itc-os:~/labs/lab4</span>
        </div>
        <div class="terminal-body">
            <div>
                <span class="prompt-user">student</span><span class="prompt-symbol">@</span><span class="prompt-path">itc-os</span><span class="prompt-symbol">:~/labs/lab4$ </span>
                <span class="cmd">ls -la</span>
            </div>
            <br>
            <div class="section-label">// LAB 4 — COMING SOON</div>
            <table class="file-table">
                <thead>
                    <tr><th class="icon"></th><th>NAME</th><th>DESCRIPTION</th><th>TYPE</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="icon">📁</td>
                        <td class="name"><a href="../index.html">..</a></td>
                        <td class="desc">Parent directory (labs/)</td>
                        <td><span class="type-badge badge-dir">DIR</span></td>
                    </tr>
                </tbody>
            </table>
            <br>
            <div class="comment"># Lab 4 content will be released soon.</div>
            <div class="comment"># Directory is currently empty.</div>
            <br>
            <div>
                <span class="prompt-user">student</span><span class="prompt-symbol">@</span><span class="prompt-path">itc-os</span><span class="prompt-symbol">:~/labs/lab4$ </span>
                <span class="cursor"></span>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="../index.html">← Back to Labs</a> &middot;
        <a href="../../index.html">Home</a>
    </div>
</div>
<script src="../../assets/terminal-theme.js"></script>
</body>
</html>
